<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upright Smart Estate</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;padding:20px}
h2{margin-top:40px}
.container{max-width:1200px;margin:auto}
.card{background:#fff;padding:20px;border-radius:8px;margin-bottom:20px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
input,select,textarea{width:100%;padding:8px;margin-top:5px;margin-bottom:10px}
button{padding:8px 15px;margin-right:5px;cursor:pointer;border:none;border-radius:5px;background:#1e90ff;color:#fff}
button.danger{background:red}
@media(max-width:768px){.form-grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<div class="container">

<h1>Upright Smart Estate</h1>

<!-- ================= TENANT SECTION ================= -->
<h2>Add / Edit Tenant</h2>
<div class="card">
<div class="form-grid">
<div>
<label>Tenant Name</label>
<input id="tenantName">
<label>CNIC</label>
<input id="tenantCnic">
<label>Phone</label>
<input id="tenantPhone">
</div>
<div>
<label>Premises on Rent</label>
<input id="premises">
<label>Rented Since</label>
<input type="date" id="rentedSince">
<label>Monthly Rent</label>
<input type="number" id="monthlyRent">
<label>Surety Deposit</label>
<input type="number" id="suretyDeposit">
<label>Electricity Meter</label>
<input id="electricityMeter">
<label>Gas Meter</label>
<input id="gasMeter">
</div>
</div>
<button onclick="saveTenant()">Save</button>
<button onclick="clearTenant()">Clear</button>
</div>

<h2>Registered Tenants</h2>
<div id="tenantList"></div>

<!-- ================= BILLING SECTION ================= -->
<h2>Billing</h2>
<div class="card">

<label>Select Tenant</label>
<select id="billTenant"></select>

<label>Select Bill Month</label>
<input type="month" id="billMonth">

<label>Monthly Rent</label>
<input id="billRent">

<label>Gas Bill</label>
<input id="gasBill">

<label>Electricity Bill</label>
<input id="electricityBill">

<label>Maintenance / Repair</label>
<input id="maintenance">

<label>Previous Arrears</label>
<input id="previousArrears">

<label>Other Charges</label>
<input id="otherCharges">

<label>Status</label>
<select id="status">
<option>Paid</option>
<option>Unpaid</option>
<option>Partially Paid</option>
</select>

<label>Remarks / Notes</label>
<textarea id="remarks"></textarea>

<button onclick="saveInvoice()">Save</button>
<button onclick="previewInvoice()">Preview</button>
<button onclick="downloadInvoice()">Download PDF</button>
<button onclick="printInvoice()">Print</button>
<button onclick="shareWhatsApp()">Share WhatsApp</button>

</div>

<h2>Invoice History</h2>
<div id="invoiceList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "upright-management-cc29f.firebaseapp.com",
  projectId: "upright-management-cc29f",
  storageBucket: "upright-management-cc29f.appspot.com",
  messagingSenderId: "61396893247",
  appId: "1:61396893247:web:406b3c44db76f8eaf7028a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentTenantId=null;
let currentInvoiceId=null;

// ================= TENANT =================
window.saveTenant = async function(){
const data={
name:tenantName.value,
cnic:tenantCnic.value,
phone:tenantPhone.value,
premises:premises.value,
rentedSince:rentedSince.value,
monthlyRent:monthlyRent.value,
suretyDeposit:suretyDeposit.value,
electricityMeter:electricityMeter.value,
gasMeter:gasMeter.value,
createdAt:new Date()
};
if(currentTenantId){
await updateDoc(doc(db,"tenants",currentTenantId),data);
currentTenantId=null;
}else{
await addDoc(collection(db,"tenants"),data);
}
clearTenant();
loadTenants();
}

window.clearTenant=function(){
document.querySelectorAll("#tenantName,#tenantCnic,#tenantPhone,#premises,#rentedSince,#monthlyRent,#suretyDeposit,#electricityMeter,#gasMeter").forEach(i=>i.value="");
}

async function loadTenants(){
tenantList.innerHTML="";
billTenant.innerHTML="";
const snap=await getDocs(collection(db,"tenants"));
snap.forEach(d=>{
const t=d.data();
tenantList.innerHTML+=`
<div class="card">
${t.name} - ${t.premises}
<button onclick="editTenant('${d.id}')">Edit</button>
<button class="danger" onclick="deleteTenant('${d.id}')">Delete</button>
</div>`;
billTenant.innerHTML+=`<option value="${d.id}" data-rent="${t.monthlyRent}" data-phone="${t.phone}">${t.name}</option>`;
});
}

window.editTenant=async function(id){
const snap=await getDoc(doc(db,"tenants",id));
const t=snap.data();
currentTenantId=id;
tenantName.value=t.name;
tenantCnic.value=t.cnic;
tenantPhone.value=t.phone;
premises.value=t.premises;
rentedSince.value=t.rentedSince;
monthlyRent.value=t.monthlyRent;
suretyDeposit.value=t.suretyDeposit;
electricityMeter.value=t.electricityMeter;
gasMeter.value=t.gasMeter;
}

window.deleteTenant=async function(id){
await deleteDoc(doc(db,"tenants",id));
loadTenants();
}

// Auto rent fill
billTenant.addEventListener("change",()=>{
const rent=billTenant.selectedOptions[0].dataset.rent;
billRent.value=rent;
});

// ================= INVOICE =================

async function getNextInvoiceNumber(){
const ref=doc(db,"counters","invoiceCounter");
const snap=await getDoc(ref);
let current=1;
if(snap.exists()){
current=snap.data().current;
await updateDoc(ref,{current:current+1});
}else{
await setDoc(ref,{current:2});
}
return "USS-"+current;
}

window.saveInvoice=async function(){
const invoiceNo=await getNextInvoiceNumber();
const total=Number(billRent.value||0)+Number(gasBill.value||0)+Number(electricityBill.value||0)+Number(maintenance.value||0)+Number(previousArrears.value||0)+Number(otherCharges.value||0);

await addDoc(collection(db,"invoices"),{
invoiceNo,
tenantId:billTenant.value,
billMonth:billMonth.value,
issueDate:new Date(),
monthlyRent:billRent.value,
gasBill:gasBill.value,
electricityBill:electricityBill.value,
maintenance:maintenance.value,
previousArrears:previousArrears.value,
otherCharges:otherCharges.value,
status:status.value,
remarks:remarks.value,
total
});
loadInvoices();
alert("Invoice Saved");
}

async function loadInvoices(){
invoiceList.innerHTML="";
const snap=await getDocs(collection(db,"invoices"));
snap.forEach(d=>{
const i=d.data();
invoiceList.innerHTML+=`
<div class="card">
${i.invoiceNo} - ${i.billMonth} - Rs ${i.total}
<button onclick="previewInvoiceById('${d.id}')">Preview</button>
<button onclick="deleteInvoice('${d.id}')">Delete</button>
</div>`;
});
}

window.deleteInvoice=async function(id){
await deleteDoc(doc(db,"invoices",id));
loadInvoices();
}

// ================= PDF =================
async function generatePDF(data){
const {jsPDF}=window.jspdf;
const docPDF=new jsPDF();

docPDF.setFillColor(135,206,235);
docPDF.rect(0,0,210,30,"F");
docPDF.setTextColor(255,255,255);
docPDF.setFontSize(18);
docPDF.text("Upright Smart Estate",105,15,{align:"center"});
docPDF.setFontSize(14);
docPDF.text("Tenancy Monthly Statement",105,25,{align:"center"});

docPDF.setTextColor(0,0,0);
docPDF.setFontSize(12);

docPDF.text("Invoice No: "+data.invoiceNo,20,40);
docPDF.text("Bill Month: "+data.billMonth,20,50);
docPDF.text("Status: "+data.status,20,60);

let y=80;
docPDF.text("Monthly Rent: "+data.monthlyRent,20,y); y+=10;
docPDF.text("Gas Bill: "+data.gasBill,20,y); y+=10;
docPDF.text("Electricity Bill: "+data.electricityBill,20,y); y+=10;
docPDF.text("Maintenance: "+data.maintenance,20,y); y+=10;
docPDF.text("Previous Arrears: "+data.previousArrears,20,y); y+=10;
docPDF.text("Other Charges: "+data.otherCharges,20,y); y+=10;

docPDF.text("Total: Rs "+data.total,20,y+10);

docPDF.text("Remarks: "+data.remarks,20,y+25);

docPDF.text("Landlord Signature: ____________",20,260);
docPDF.text("Tenant Signature: ____________",120,260);

return docPDF;
}

window.previewInvoice=async function(){
const total=Number(billRent.value||0)+Number(gasBill.value||0)+Number(electricityBill.value||0)+Number(maintenance.value||0)+Number(previousArrears.value||0)+Number(otherCharges.value||0);
const pdf=await generatePDF({
invoiceNo:"Preview",
billMonth:billMonth.value,
status:status.value,
monthlyRent:billRent.value,
gasBill:gasBill.value,
electricityBill:electricityBill.value,
maintenance:maintenance.value,
previousArrears:previousArrears.value,
otherCharges:otherCharges.value,
remarks:remarks.value,
total
});
pdf.output("dataurlnewwindow");
}

window.downloadInvoice=async function(){
previewInvoice();
}

window.printInvoice=function(){
window.print();
}

window.shareWhatsApp=function(){
const phone=billTenant.selectedOptions[0].dataset.phone;
const message=`Upright Smart Estate\nMonthly Statement\nTotal: Rs ${billRent.value}`;
window.open(`https://wa.me/92${phone}?text=${encodeURIComponent(message)}`,"_blank");
}

window.previewInvoiceById=async function(id){
const snap=await getDoc(doc(db,"invoices",id));
const pdf=await generatePDF(snap.data());
pdf.output("dataurlnewwindow");
}

loadTenants();
loadInvoices();

</script>
</body>
</html>
