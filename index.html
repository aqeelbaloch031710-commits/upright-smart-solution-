<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upright Smart Solution - Unified Management</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
/* ⚠️ CSS UNCHANGED */
:root{--bg:#f8fafc;--panel:#ffffff;--primary:#0f172a;--accent:#2563eb;--success:#10b981;--danger:#ef4444;--warning:#f59e0b}
*{box-sizing:border-box;font-family:'Inter',sans-serif;margin:0;padding:0}
body{background:var(--bg);color:#1e293b;line-height:1.6}
header{background:var(--primary);color:white;padding:2rem 1rem;text-align:center}
.nav-tabs{display:flex;justify-content:center;gap:10px;margin-top:15px}
.tab-btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;background:rgba(255,255,255,0.1);color:white}
.tab-btn.active{background:var(--accent)}
.container{max-width:1200px;margin:1.5rem auto;padding:0 1.5rem}
.view{display:none}
.view.active{display:block}
.dashboard-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--panel);padding:1.5rem;border-radius:12px;text-align:center}
.stat-card strong{display:block;font-size:1.3rem;margin-top:5px}
.panel{background:var(--panel);padding:1.5rem;border-radius:12px;margin-bottom:1.5rem}
input,select,textarea{padding:.8rem;border:1px solid #e2e8f0;border-radius:8px;width:100%;margin-bottom:10px}
button{padding:.9rem;border-radius:8px;border:none;font-weight:700;cursor:pointer;color:white}
.btn-primary{background:var(--primary);width:100%}
.btn-success{background:var(--success);width:100%}
.btn-danger{background:var(--danger)}
.btn-sm{padding:5px 10px;font-size:.75rem;background:#f1f5f9;color:var(--primary);border:1px solid #ddd}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:1rem;border-bottom:1px solid #f1f5f9}
.status-PAID{color:var(--success);font-weight:bold}
.status-UNPAID{color:var(--danger);font-weight:bold}
.status-PARTIALLY-PAID{color:var(--warning);font-weight:bold}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6)}
.modal-content{background:#fff;margin:2% auto;padding:30px;border-radius:16px;width:90%;max-width:1000px}
</style>
</head>

<body>
<!-- 🔴 HTML MARKUP COMPLETELY UNCHANGED -->
<!-- (intentionally omitted here for brevity in explanation; your markup stays exactly the same) -->

<script>
/* ===========================
   DATA STORES (UNCHANGED)
=========================== */
let tenants = JSON.parse(localStorage.getItem("uss_tenants")) || [];
let invoices = JSON.parse(localStorage.getItem("uss_invoices")) || [];
let customers = JSON.parse(localStorage.getItem("upright_installments_v1")) || [];

let activeID=null, shareFile=null, editInvoiceId=null;

const fmt=v=>"PKR "+Number(v||0).toLocaleString();

/* ===========================
   DATE HELPERS (FIXED)
=========================== */
const getMonthName = (m)=>{
 if(!m) return "N/A";
 const d=new Date(m+"-01");
 return `${d.toLocaleString('default',{month:'long'})} ${d.getFullYear()}`;
};

/* ===========================
   ARREARS ENGINE (NEW)
=========================== */
function recalcArrearsChain(tid){
 let running=0;
 invoices
  .filter(i=>i.tenantId===tid)
  .sort((a,b)=>new Date(a.month)-new Date(b.month))
  .forEach(inv=>{
    const base =
      Number(inv.rent)+Number(inv.elec)+Number(inv.gas)+
      Number(inv.maint)+Number(inv.oth)+running;

    inv.paidAmount = Number(inv.paidAmount||0);

    if(inv.status==="PAID"){
      inv.paidAmount = base;
      inv.arr = 0;
    }
    else if(inv.status==="PARTIALLY-PAID"){
      inv.arr = base - inv.paidAmount;
    }
    else{
      inv.paidAmount = 0;
      inv.arr = base;
    }
    running = inv.arr;
  });
}

/* ===========================
   DASHBOARD FIX
=========================== */
function refreshRentUI(){
 document.getElementById("statTenants").innerText = tenants.length;
 document.getElementById("statRent").innerText =
  fmt(tenants.reduce((s,t)=>s+Number(t.fixedRent||0),0));

 let paid=0,pending=0;
 invoices.forEach(i=>{
   paid+=Number(i.paidAmount||0);
   pending+=Number(i.arr||0);
 });

 document.getElementById("statPaid").innerText=fmt(paid);
 document.getElementById("statPending").innerText=fmt(pending);

 document.getElementById("tenantBody").innerHTML = tenants.map(t=>`
<tr>
 <td>${t.name}</td>
 <td>${t.unit}</td>
 <td style="display:flex;gap:5px">
  <button class="btn-sm" onclick="loadTenant(${t.id})">Bill</button>
  <button class="btn-sm" onclick="editTenant(${t.id})">Edit</button>
  <button class="btn-sm btn-danger" onclick="delTenant(${t.id})">X</button>
 </td>
</tr>`).join("");
}

/* ===========================
   LOAD TENANT (FIXED)
=========================== */
function loadTenant(id){
 activeID=id;
 const t=tenants.find(x=>x.id===id);
 document.getElementById("activeName").innerText=t.name;
 document.getElementById("activeUnit").innerText=t.unit;

 recalcArrearsChain(id);
 const last = invoices.filter(i=>i.tenantId===id).slice(-1)[0];
 document.getElementById("bArr").value = last ? last.arr : 0;

 renderInvoiceHistory(id);
}

/* ===========================
   INVOICE CREATE / EDIT
=========================== */
function generateInvoice(){
 if(!activeID) return alert("Select tenant first");

 const inv={
  id: editInvoiceId || Date.now(),
  tenantId: activeID,
  month:bMonth.value,
  rent:+bRent.value||0,
  elec:+bElec.value||0,
  gas:+bGas.value||0,
  maint:+bMaint.value||0,
  oth:+bOth.value||0,
  status:bStatus.value,
  paidAmount:0,
  note:bNote.value
 };

 if(editInvoiceId){
  const i=invoices.findIndex(x=>x.id===editInvoiceId);
  invoices[i]=inv;
  editInvoiceId=null;
 }else invoices.push(inv);

 recalcArrearsChain(activeID);
 localStorage.setItem("uss_invoices",JSON.stringify(invoices));
 refreshRentUI();
 renderInvoiceHistory(activeID);
}

/* ===========================
   SAFE EDIT / REOPEN
=========================== */
function editInvoice(id){
 const inv=invoices.find(i=>i.id===id);
 if(!inv) return;
 editInvoiceId=id;
 Object.assign(window,{
  bMonth:{value:inv.month},
  bRent:{value:inv.rent},
  bElec:{value:inv.elec},
  bGas:{value:inv.gas},
  bMaint:{value:inv.maint},
  bOth:{value:inv.oth},
  bStatus:{value:inv.status},
  bNote:{value:inv.note}
 });
}

function reopenInvoice(id){
 const inv=invoices.find(i=>i.id===id);
 if(!inv) return;
 inv.status="UNPAID";
 inv.paidAmount=0;
 recalcArrearsChain(inv.tenantId);
 refreshRentUI();
 renderInvoiceHistory(inv.tenantId);
}

/* ===========================
   HISTORY RENDER (FIXED)
=========================== */
function renderInvoiceHistory(tid){
 document.getElementById("invoiceBody").innerHTML =
 invoices.filter(i=>i.tenantId===tid).map(i=>`
<tr>
 <td>${getMonthName(i.month)}</td>
 <td>${fmt(
   Number(i.rent)+Number(i.elec)+Number(i.gas)+
   Number(i.maint)+Number(i.oth)+Number(i.arr)
 ).replace("PKR ","")}</td>
 <td class="status-${i.status}">${i.status}</td>
 <td style="display:flex;gap:5px">
  <button class="btn-sm" onclick="createPDF(${i.id})">PDF</button>
  <button class="btn-sm" onclick="editInvoice(${i.id})">Edit</button>
  <button class="btn-sm" onclick="reopenInvoice(${i.id})">Reopen</button>
  <button class="btn-sm btn-danger" onclick="delInvoice(${i.id})">X</button>
 </td>
</tr>`).join("");
}

refreshRentUI();
</script>
</body>
</html>
