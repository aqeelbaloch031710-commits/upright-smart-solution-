<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upright Smart Solution – PMS Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header>
  <h1>Upright Smart Solution</h1>
  <p>Tenancy Management System</p>
</header>

<main class="container">

  <!-- DASHBOARD -->
  <div class="dashboard-stats">
    <div class="stat-card"><span>Total Tenants</span><strong id="statTenants">0</strong></div>
    <div class="stat-card"><span>Monthly Rent Pool</span><strong id="statRent">PKR 0</strong></div>
    <div class="stat-card paid"><span>Total Collected</span><strong id="statPaid">PKR 0</strong></div>
    <div class="stat-card pending"><span>Total Arrears</span><strong id="statPending">PKR 0</strong></div>
  </div>

  <!-- MAIN GRID -->
  <div class="main-content">

    <!-- LEFT -->
    <div class="form-column">

      <!-- TENANT -->
      <section class="panel">
        <h2>1. Register New Tenant</h2>

        <div class="two-column-grid">
          <div class="column">
            <h3 class="sub-title">Tenant Details</h3>
            <input id="tName" placeholder="Full Name">
            <input id="tPhone" placeholder="Phone Number">
            <input id="tCnic" placeholder="CNIC Number">
          </div>

          <div class="column">
            <h3 class="sub-title">Property Details</h3>
            <input id="tUnit" placeholder="Premises / Flat No">
            <input id="tElec" placeholder="Electricity Meter A/C No">
            <input id="tGas" placeholder="Gas Meter A/C No">
            <input type="date" id="tSince">
            <input type="number" id="tDep" placeholder="Surety Deposit">
            <input type="number" id="tFixedRent" placeholder="Monthly Rent">
          </div>
        </div>

        <button class="btn-primary" onclick="saveTenant()">Save Tenant</button>
      </section>

      <!-- BILLING -->
      <section class="panel">
        <h2>2. Billing: <span id="activeName">Select Tenant</span></h2>

        <div class="input-grid">
          <input type="month" id="bMonth">
          <input type="number" id="bRent" placeholder="Rent">
          <input type="number" id="bElec" placeholder="Electricity">
          <input type="number" id="bGas" placeholder="Gas">
          <input type="number" id="bMaint" placeholder="Maintenance">
          <input type="number" id="bArr" placeholder="Arrears">
          <input type="number" id="bOth" placeholder="Other Charges">
        </div>

        <select id="bStatus">
          <option value="UNPAID">UNPAID</option>
          <option value="PAID">PAID</option>
        </select>

        <div class="btn-group">
          <button class="btn-success" onclick="generateInvoice()">Download Invoice</button>
          <button class="btn-wa" id="waBtn" onclick="shareToWhatsApp()" style="display:none;">WhatsApp Share</button>
        </div>
      </section>
    </div>

    <!-- RIGHT -->
    <div class="list-column">

      <section class="panel">
        <h3>Registered Tenants</h3>
        <div class="scroll-table">
          <table>
            <thead>
              <tr><th>Name</th><th>Unit</th><th>Action</th></tr>
            </thead>
            <tbody id="tenantBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h3>Billing History</h3>
        <div class="scroll-table">
          <table>
            <thead>
              <tr><th>Month</th><th>Total</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody id="invoiceBody"></tbody>
          </table>
        </div>
      </section>

    </div>

  </div>
</main>

<script src="app.js"></script>
</body>
</html>
