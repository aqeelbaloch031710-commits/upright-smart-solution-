<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upright Smart Solution</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0}
.panel{background:#fff;margin:1rem;padding:1rem;border-radius:8px}
button{padding:.4rem .7rem;margin:.1rem}
.status-PAID{color:green;font-weight:bold}
.status-UNPAID{color:red;font-weight:bold}
.status-PARTIALLY-PAID{color:orange;font-weight:bold}
</style>
</head>

<body>

<div class="panel">
<h3>Dashboard</h3>
Paid: <span id="statPaid">0</span><br>
Pending Arrears: <span id="statPending">0</span>
</div>

<div class="panel">
<h3>Invoices</h3>
<table border="1" width="100%">
<thead>
<tr><th>Month</th><th>Total</th><th>Status</th><th>Action</th></tr>
</thead>
<tbody id="invoiceBody"></tbody>
</table>
</div>

<script>
let invoices = JSON.parse(localStorage.getItem("invoices")||"[]");
let editingInvoiceId = null;

const fmt=v=>"PKR "+Number(v||0).toLocaleString();

/* 🔁 MONTH SORT */
function monthKey(m){ return new Date(m+"-01").getTime(); }

/* 🔁 RECALCULATE ARREARS CHAIN */
function recalcArrears(){
  let runningArrears = 0;

  invoices.sort((a,b)=>monthKey(a.month)-monthKey(b.month));

  invoices.forEach(inv=>{
    inv.prevArr = runningArrears;

    let total =
      Number(inv.rent)+Number(inv.elec)+Number(inv.gas)+
      Number(inv.maint)+Number(inv.oth)+Number(inv.prevArr);

    if(inv.status==="PAID"){
      inv.paidAmount = total;
      inv.arr = 0;
    }
    else if(inv.status==="PARTIALLY-PAID"){
      inv.paidAmount = Number(inv.paidAmount||0);
      inv.arr = total - inv.paidAmount;
    }
    else{
      inv.paidAmount = 0;
      inv.arr = total;
    }

    runningArrears = inv.arr;
    inv.total = total;
  });

  localStorage.setItem("invoices",JSON.stringify(invoices));
}

/* 📊 DASHBOARD */
function refreshStats(){
  let paid=0, pending=0;

  invoices.forEach(i=>{
    paid += Number(i.paidAmount||0);
    pending += Number(i.arr||0);
  });

  statPaid.innerText = fmt(paid);
  statPending.innerText = fmt(pending);
}

/* 📄 RENDER */
function render(){
  recalcArrears();
  refreshStats();

  invoiceBody.innerHTML = invoices.map(i=>`
<tr>
<td>${i.month}</td>
<td>${fmt(i.total)}</td>
<td class="status-${i.status}">${i.status}</td>
<td>
<button onclick="editInvoice(${i.id})">Edit</button>
<button onclick="reopenInvoice(${i.id})">Reopen</button>
</td>
</tr>`).join("");
}

/* ✏️ EDIT */
function editInvoice(id){
  const inv=invoices.find(i=>i.id===id);
  if(!inv)return;
  editingInvoiceId=id;

  const paid = prompt("Enter paid amount",inv.paidAmount||0);
  if(paid===null)return;

  inv.paidAmount = Number(paid);
  inv.status = inv.paidAmount>=inv.total ? "PAID" : "PARTIALLY-PAID";

  render();
}

/* 🔓 REOPEN */
function reopenInvoice(id){
  const inv=invoices.find(i=>i.id===id);
  if(!inv)return;

  inv.status="UNPAID";
  inv.paidAmount=0;
  render();
}

/* DEMO DATA SAFE */
if(!invoices.length){
  invoices=[
    {id:1,month:"2025-01",rent:10000,elec:500,gas:300,maint:0,oth:0,status:"UNPAID"},
    {id:2,month:"2025-02",rent:10000,elec:400,gas:250,maint:0,oth:0,status:"PARTIALLY-PAID",paidAmount:8000},
    {id:3,month:"2025-03",rent:10000,elec:600,gas:350,maint:0,oth:0,status:"PAID"}
  ];
}

render();
</script>

</body>
</html>
